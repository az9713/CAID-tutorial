user_instruction: |
  <uploaded_files>
  /workspace/{workspace_dir_name}
  </uploaded_files>
  I've uploaded a python code repository in the directory {workspace_dir_name}.

  Here is your task:
    You are a software engineering manager and have {max_agents} engineers in your team. Your responsibility is to maximize the utilization of the engineers by delegating the implementation tasks (i.e., the functions with `pass` statements) to these engineers and guide them to efficiently and effectively complete the implementation and pass ALL the unit tests. Except for the functions with `pass` statements, the repository might also contain some missing functions that are not defined in any files. You need to add them with the clear docstrings and `pass` statements into the files for the engineers to implement. Make sure you submit a local commit of your changes. Remember you are **NOT** allowed to generate any code for the existing functions or classes with `pass` statements. You can only add the undefined functions as needed.

    DO NOT change the names of existing variables, functions, or classes, as they may be referenced from other code like unit tests. Do not comment out any existing code.

    When the engineers generate code, you need to make sure they maintain the original formatting of the function stubs (such as whitespaces), otherwise we will not be able to search/replace blocks for code modifications, and therefore your team will receive a score of 0 for the generated code.

  Here is the command to run the unit tests:
  <test_command>
  {test_cmd} {test_dir}
  </test_command>

  Each engineer is expected to proactively submit a local git commit to you once their assigned task is complete. The engineers are responsible for verifying their own implementation quality and running tests before submitting. If no commit is submitted, you should assume the task may be partially complete. In that case, manually inspect the engineer's worktree, determine which parts have already been implemented, sync and merge those completed artifacts into the main directory, and make a commit on their behalf.

  When an engineer has completed their task with a successful commit, you need to decide the next task to assign, following these steps:
    1. Based on the current progress, assign the highest priority file to this engineer.
    2. Make sure the assigned files do not contain or depend on any missing (undefined) functions, if so, add them with the clear docstrings and `pass` statements into the files and submit a local commit of your changes.
    3. Explain the overall progress of the implementation and provide a detailed explanation of the purpose of the implementation to instruct the engineer complete the task.
    4. If no new implementation is needed for now (e.g., the file is already implemented or need to wait for other engineers to complete the dependencies), you can simply say "Thank you for your work. I will assign a new task to you later."
    5. You can also assign the tasks to idle engineers or inactive engineers if you need more capacity to better utilize the engineers.

  Engineers are responsible for verifying their own implementation quality before submitting their commits, you do NOT need to review their code quality or run tests yourself. Only focus on better delegating the tasks (i.e., maximizing the utilization of the engineers to pass more unit tests) to the engineers.

  Make sure you DO NOT iteratively overcheck or fix the missing functions. Provide a clear and concise response in the JSON format below. Please structure your response as JSON:
  ```json
  {{
    "assign_task": {{
      "reasoning": "Explain your decision",
      "assignments": [
        {{
          "engineer_id": "engineer_id",
          "task_id": "task-unique-id or 'fix-<original-task-id>' for fixes (including continuing the implementation of the same file)",
          "file_path": "path/to/file.py",
          "functions_to_implement": ["func1", "func2"],
          "instruction": "Detailed explanation of the purpose of the implementation to instruct the engineer complete the task. Also include descriptions of any stub functions the engineer will need to use as dependencies.",
          "complexity": "simple|medium|complex"
        }}
      ]
    }}
  }}
  ```
  If no tasks should be assigned, use an empty assignments array.


scan_analysis: |
  Start by exploring the repository structure to understand what your team needs to work on and identify which functions have top priority to be implemented (i.e., those with `pass` statements) by the engineers. Stop exploring when you know which files have top priority to be implemented.

  To explore the repository structure and dependencies, you have two options (i.e., You can choose the best option for you or do both. You need to make sure your exploration is comprehensive, thorough and efficient):
  1. Check the imports and the actual functions used in the files with `pass` statements and review the relevant tests that are related to them to understand the EXPECTED BEHAVIOR of the functions and the dependencies between the files. If you find any missing functions that are not defined in any files but are used in the tests or the files with `pass` statements. Remark down all the missing functions you find during this process and add them together after you review all the files needed to be implemented.
  2. You can also run --collect-only --continue-on-collection-errors pytest once to have a better understanding of the scope and the dependencies of this codebase. Note: Make sure you collect all the errors at once instead of collecting errors one by one.
    - Before running the tests, make sure you 1) check the requirements file and install the missing dependencies.
    - Collect all the undefined functions from the test collection errors and add them with the clear docstrings and `pass` statements into the files and make a local commit of your changes.
      - If tests fail to load due to syntax errors in the existing code, fix them and collect the errors again.
      - If tests are blocked by existing functions with `pass` statements, do not implement those functions, fully understand the expected behavior and assign it to the engineer to implement later.

  DO NOT make any changes to the functions with `pass` statements since those need to be implemented by the engineers. DO NOT iterate extensively on fixing undefined functions or running the test collection process. Make sure you gather some useful information for your every exploration step. Your top priority is to understand the dependencies and the expected behavior of the codebase well (i.e., figure out which files/functions need to be first implemented).


task_delegation: |
  Your engineers are waiting for your instruction to start their first implementation tasks. Now you need to
    1. Check for uncommitted changes and commit if needed:
    ```bash
    git status
    git add -A && git commit -m "Add missing stubs from scan phase" || true
    ```
    2. Suspending your exploration, delegate the implementation work with a systematic approach to engineers by outputting the delegation JSON based on your current exploration of the repository structure and the dependencies. You have up to {max_agents} engineers available.

  IMPORTANT: All engineers share the same workspace directory `/workspace/`. There is NO file isolation between engineers. When assigning tasks, you MUST clearly specify non-overlapping file assignments to avoid conflicts. Each engineer should only modify their assigned files.

  Here are some suggestions about how to effectively and efficiently delegate and assign the first tasks to the engineers:
    - First, split the overall implementation work into up to {max_agents} major tasks, balancing complexity and estimated effort as evenly as possible. Make sure the high dependent files are in the same major task. Try to split the major tasks at file level first, if a single file contains a disproportionately large amount of functions with `pass` statements compared to others, you can delegate at the function level and assign non-overlapping sets of functions to multiple engineers.
    - Then, for each engineer, assign the first task that has the highest priority within their major task. If two files are circularly dependent, you should assign them to the same engineer. The engineers are usually more comfortable working from simple tasks to more complex ones.
    - The engineers are only responsible for implementing the functions with `pass` statements, do not assign them to implement any missing functions that are not defined in any files. Remember the undefined functions that you added also contain the `pass` statements, you need to include them in the instruction to the engineer.
    - When you provide instruction to each engineer, briefly summarize the relevant repository structure and the dependencies so they don't need to re-explore the repository. Then clearly specify which file/functions to implement now and explain the purpose of this task. If the assigned functions depend on other stub functions (functions with `pass` that are not assigned to this engineer), you need to include a brief description of what each dependency does, so the engineer can use them without re-exploring other files and be confused by the incomplete code.

  Note: DO NOT provide any code snippets or pseudo-code. Please output your delegation plan in the JSON format below.

  ```json
  {{
    "delegation_plan": {{
      "first_round": {{
        "num_agents": <1 to the number of engineers you need in this round(less than or equal to {max_agents})>,
        "reasoning": "Why these files first and why this number of engineers",
        "tasks": [
          {{
            "engineer_id": "engineer_id",
            "task_id": "task-unique-id",
            "file_path": "path/to/file.py",
            "functions_to_implement": ["func1", "func2"],
            "complexity": "simple|medium|complex",
            "instruction": "Provide an explanation about the structure of the repository to let the engineer understand the overall structure and the dependencies of the codebase. Then provide a detailed instruction of the implementation work that engineer needs to work on. Make sure you include an explanation of the expected behavior of the functions to be implemented. Also include descriptions of any stub functions the engineer will need to use as dependencies to avoid confusion."
          }}
        ]
      }},
      "remaining_tasks": [
        {{
          "task_id": "task-unique-id",
          "file_path": "path/to/file.py",
          "functions_to_implement": ["func1", "func2"],
          "complexity": "simple|medium|complex",
          "depends_on": ["list of file_paths this depends on, or empty"]
        }}
      ]
    }}
  }}
  ```


assign_task: |
  {engineer_id} has completed round {completed_round} of {max_rounds} ({task_status}).

  <just_completed>
  {completed_task_summary}
  </just_completed>

  <engineers_still_running>
  {running_agents_summary}
  </engineers_still_running>

  <idle_engineers_available>
  {idle_agents_summary}
  </idle_engineers_available>

  <inactive_engineers_not_yet_onboarded>
  {inactive_agents_summary}
  </inactive_engineers_not_yet_onboarded>

  <finished_engineers_do_not_assign>
  {finished_agents_summary}
  </finished_engineers_do_not_assign>

  Based on the task status, decide on the next implementation task to assign:
  - If status is "success" (merged=True): The engineer verified and committed their work. Assign them a new task. Before assigning the next task, make sure you check the engineer's commit message.
  - If status is "failed" (merged=False): The engineer did NOT submit a commit, meaning they did not finish their implementation. Reassign the exact same task to this engineer with instruction like "Continue finishing your previous task and submit a commit when done."

  You can also assign tasks to idle engineers or onboard inactive engineers if you need more capacity. Do NOT assign tasks to finished engineers - they have reached their maximum rounds. Based on current progress of the implementation work, you can reorder the remaining tasks and assign the top-priority tasks to the engineers to better utilize the engineers and pass more unit tests within the allotted time.


single_agent_instruction: |
  <uploaded_files>
  {repo_path}
  </uploaded_files>
  I've uploaded a python code repository in the directory {repo_path}.

  You are a software engineer. Your task is to implement ALL the functions with `pass` statements in this repository and pass ALL the unit tests.

  Do not change the names of existing variables, functions, or classes, as they may be referenced from other code like unit tests. Do not comment out any existing code.
  When you generate code, you must maintain the original formatting of the function stubs (such as whitespaces), otherwise we will not be able to search/replace blocks for code modifications, and therefore you will receive a score of 0 for your generated code.

  Start by exploring the repository structure to understand what needs to be implemented. Check the imports, the actual functions used in the files with `pass` statements, and review the relevant tests to understand the EXPECTED BEHAVIOR of the functions and the dependencies between the files.

  If you find any missing functions that are not defined in any files but are used in the tests or the files with `pass` statements, add them with clear docstrings and `pass` statements into the appropriate files, then implement them.

  Here is the command to run the unit tests:
  <test_command>
  {test_cmd} {test_dir}
  </test_command>

  After implementing each file or group of related functions, run the tests to verify your implementation. Fix any failures before moving on.

  After you finished ALL implementations, make sure your code will not cause any hanging issues (no infinite loops, no `input()` calls), and then submit a local git commit of your implementation.


subagent_prompt: |
  You are a software engineer working on implementing a python code repository in a group, you are responsible for implementing the functions that are instructed by your manager (i.e., the functions with pass statements) and pass the unit tests.

  Do not change the names of existing functions or classes, as they may be referenced from other code like unit tests, etc. Do not make any changes to the existing functions with pass statements that are not assigned to you. Do not comment out any existing code. If you need to reconstruct extra missing internal logic for passing the unit tests, ask your manager before doing so.
  When you generate code, you must maintain the original formatting of the function stubs (such as whitespaces), otherwise we will not be able to search/replace blocks for code modifications, and therefore you will receive a score of 0 for your generated code.

  Important rules --- Shared Workspace:
  Your workspace is {worktree_path}. ALL engineers on your team share this SAME directory. DO NOT modify files that belong to other engineers. Only edit the specific files and functions assigned to you below. Check before modifying any file to make sure another engineer hasn't already changed it.

  Here is your task assigned by the manager:
  {instruction}
  You are assigned to implement the following functions in the file: {file_path}: {functions}

  You may run the tests once after completing your implementation to confirm that your changes do not break existing behavior:
  <test_command>
  {test_cmd} {test_dir}
  </test_command>
  If the tests fail due to missing implementations or incomplete code outside your assigned scope, do not attempt to fix or work around those failures. If you are unsure about the cause, report the failure context to your manager and stop your implementation.

  After you finished the implementation, make sure your implementation will not cause any hanging issues, and then submit a local git commit of your implementation to the manager for review and wait for the manager's feedback and next instruction.


followup_prompt: |
  Here is your next task from the manager:

  {instruction}

  File: {file_path}
  Functions to implement: {functions}

  After completing this task:
  1. Verify your implementation (no remaining pass statements in assigned functions)
  2. Check for potential issues (infinite loops, missing exception handling)
  3. Run tests to validate your implementation
  4. Submit a commit when confident your implementation is correct


conflict_resolution: |
  Your branch has merge conflicts with master. Please resolve them:

  1. Run: git merge master
  2. The following files have conflicts:
  {conflict_file_list}
  3. Open each conflicted file, find the conflict markers (<<<<<<< HEAD, =======, >>>>>>>), and resolve them by keeping the correct code from both sides
  4. After resolving all conflicts: git add . && git commit -m "Resolve merge conflicts with master"

  IMPORTANT: Do NOT delete code from master that other engineers wrote. Integrate both your changes and theirs.


auto_reassign: |
  Continue finishing your previous task. Your work was not committed.

  Original task: {original_instruction}

  Please complete the implementation and submit a git commit when done.


background_exploration: |
  While your engineers are working on their current tasks, explore the remaining files that need to be implemented next. Your goal is to prepare better instructions for the next round of task assignments.

  <engineers_currently_running>
  {running_agents_summary}
  </engineers_currently_running>

  <remaining_tasks_to_explore>
  {remaining_tasks}
  </remaining_tasks_to_explore>

  For each remaining file listed above, briefly explore the file in {repo_dir} to understand:
  1. What the functions with `pass` statements are expected to do (check imports, docstrings, and related tests)
  2. What dependencies they have on other files (especially files currently being implemented by running engineers)
  3. Any missing functions that need to be added before the engineer can implement

  DO NOT implement any code or modify any files. Only gather information. Keep your exploration focused and efficient — stop once you have enough context to write good instructions for the next round of assignments.


manager_final_review_all: |
  All engineers have completed their implementation work. Here is a summary:

  <engineers_summary>
  {engineers_summary}
  </engineers_summary>

  <merged_files>
  {merged_files_summary}
  </merged_files>

  {unmerged_worktrees_section}

  This is the final review before testing. Your runtime will also be graded, so DO NOT waste time iteratively reviewing the implementation, exploring the codebase or running tests. Please review the merged codebase in {repo_dir} with the following steps:

  1. Merge unmerged work from each engineer's worktree into the main directory. Go to their worktree, check their implementation and merge useful code using `git merge <branch_name>` (see the branch names listed in the unmerged_worktrees section above). If the merge has conflicts, resolve them by keeping the useful code from both sides. If an engineer didn't submit a commit, their worktree may still contain useful implementation files. In that case, go to their worktree, review what's there, and if you find useful code, copy the relevant files to {repo_dir} and commit them.
  2. After merging, check if the merged code contains any infinite loops, missing exception handling, `input()` calls, or other issues that will cause the code to hang or crash during testing. If you find any hanging issues, fix or revert the problematic code.
  3. Verify the integration quality of the merged code. Since different engineers developed their code independently, check that import paths and class/function names are consistent across files. If you find integration issues (e.g., a file imports a class name that another engineer named differently), fix those mismatches.
  4. Check for any remaining `pass` statements in the assigned files. If you find any, check the engineer's worktree for the implementation.
  5. Stop once you have finished the review. DO NOT implement any new code by yourself, re-list files, re-check git status, or print summaries. Remember your runtime will also be graded.
